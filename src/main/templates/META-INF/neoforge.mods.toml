modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mixins]]
config="create_submarine.mixins.json"

[[mixins]]
config="create_abyss.mixins.json"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="Maxenonyme"
logoFile="logo.png"
logoBlur=false
description='''
A submarine addon for the Create mod.
'''

[[mods]]
modId="${abyss_mod_id}"
version="${abyss_mod_version}"
displayName="${abyss_mod_name}"
authors="Maxenonyme"
logoFile="logo_abyss.png"
logoBlur=false
description='''
The Abyss dimension and its fauna, for Create Deep Seas.
'''

[[mods]]
